version: '3.8'

services:
  webui:
    image: ghcr.io/haaris-ai/ollama-ai-ui:latest # Automated builds via GitHub Actions
    build: .
    container_name: ollama-ai-ui
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=change_this_secret_in_production
      - DB_PATH=/app/data/ollama-webui.db
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup
    restart: unless-stopped
